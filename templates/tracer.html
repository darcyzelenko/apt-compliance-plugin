<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tracer — floor plan to rooms</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2EEE5;
    --paper-2:#E8E2D5;
    --ink:#15191C;
    --ink-soft:#4A5258;
    --line:#C9C0AE;
    --accent:#E8542B;
    --accent-soft:#F6C9B8;
    --ok:#2F7D4F;
    --warn:#B5781A;
    --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 30px rgba(20,30,40,.10);
    --r:14px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    font-family:'Archivo',sans-serif;
    background:var(--paper);
    color:var(--ink);
    overflow:hidden;
    position:fixed;width:100%;
    background-image:
      linear-gradient(rgba(201,192,174,.35) 1px,transparent 1px),
      linear-gradient(90deg,rgba(201,192,174,.35) 1px,transparent 1px);
    background-size:26px 26px;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}

  /* ---------- header ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:40;
    display:flex;align-items:center;justify-content:space-between;
    padding:calc(env(safe-area-inset-top) + 12px) 18px 12px;
    background:linear-gradient(180deg,var(--paper) 60%,rgba(242,238,229,0));
  }
  .brand{display:flex;align-items:baseline;gap:8px;}
  .brand h1{
    font-size:21px;font-weight:800;letter-spacing:-.5px;margin:0;
  }
  .brand .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;transform:translateY(-2px);}
  .brand small{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);}
  .hbtn{
    font-family:'IBM Plex Mono';font-size:11px;font-weight:500;letter-spacing:.5px;
    border:1.5px solid var(--ink);background:transparent;color:var(--ink);
    padding:7px 12px;border-radius:9px;cursor:pointer;text-transform:uppercase;
  }
  .hbtn:active{background:var(--ink);color:var(--paper);}

  /* ---------- stage ---------- */
  #stage{position:fixed;inset:0;padding-top:64px;display:flex;flex-direction:column;}

  /* ---------- upload screen ---------- */
  #upload{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:22px;text-align:center;}
  .drop{
    width:100%;max-width:440px;aspect-ratio:4/5;max-height:52vh;
    border:2px dashed var(--line);border-radius:22px;
    background:rgba(255,255,255,.5);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    cursor:pointer;transition:.18s;position:relative;overflow:hidden;
  }
  .drop.drag{border-color:var(--accent);background:var(--accent-soft);}
  .drop svg{width:46px;height:46px;stroke:var(--ink);stroke-width:1.5;fill:none;}
  .drop .big{font-size:19px;font-weight:700;letter-spacing:-.3px;}
  .drop .sub{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-soft);max-width:240px;line-height:1.5;}
  .corner{position:absolute;width:22px;height:22px;border:2.5px solid var(--accent);}
  .corner.tl{top:14px;left:14px;border-right:0;border-bottom:0;}
  .corner.tr{top:14px;right:14px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:14px;left:14px;border-right:0;border-top:0;}
  .corner.br{bottom:14px;right:14px;border-left:0;border-top:0;}
  .uprow{display:flex;gap:12px;width:100%;max-width:440px;}
  .btn{
    flex:1;font-family:'Archivo';font-weight:700;font-size:15px;letter-spacing:-.2px;
    padding:15px 18px;border-radius:13px;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .btn svg{width:19px;height:19px;stroke:currentColor;stroke-width:1.8;fill:none;}
  .btn-primary{background:var(--ink);color:var(--paper);box-shadow:var(--shadow);}
  .btn-primary:active{transform:translateY(1px);}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  .btn-accent{background:var(--accent);color:#fff;box-shadow:var(--shadow);}
  .btn:disabled{opacity:.4;pointer-events:none;}
  .hint-line{font-family:'IBM Plex Mono';font-size:11px;color:var(--ink-soft);letter-spacing:.3px;}

  /* ---------- workspace ---------- */
  #work{flex:1;position:relative;display:none;}
  #canvasWrap{
    position:absolute;inset:0;bottom:0;
    display:flex;align-items:center;justify-content:center;
    padding:8px 8px 0;overflow:hidden;touch-action:none;
  }
  .imgbox{position:relative;display:inline-block;box-shadow:var(--shadow);border-radius:6px;overflow:hidden;background:#fff;transform-origin:0 0;will-change:transform;}
  #planImg{display:block;max-width:100%;max-height:100%;user-select:none;-webkit-user-drag:none;}
  #overlay{position:absolute;top:0;left:0;touch-action:none;}

  /* zoom controls */
  #zoomctl{position:absolute;top:12px;right:12px;z-index:22;display:flex;flex-direction:column;gap:6px;}
  #zoomctl button{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);background:rgba(242,238,229,.92);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
  #zoomctl svg{width:18px;height:18px;stroke:var(--ink);stroke-width:2;fill:none;}
  #zoomctl button:active{background:var(--paper-2);}

  /* loading */
  #loading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:rgba(242,238,229,.85);backdrop-filter:blur(3px);z-index:20;}
  .scan{width:130px;height:130px;border:2px solid var(--line);border-radius:12px;position:relative;overflow:hidden;}
  .scan::after{content:'';position:absolute;left:0;right:0;height:30%;top:-30%;background:linear-gradient(180deg,transparent,var(--accent-soft),transparent);animation:scan 1.3s ease-in-out infinite;}
  @keyframes scan{0%{top:-30%}100%{top:100%}}
  #loadtext{font-family:'IBM Plex Mono';font-size:12px;letter-spacing:.5px;color:var(--ink-soft);}

  /* ---------- bottom sheet ---------- */
  #sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:var(--paper);border-top:1.5px solid var(--line);
    border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(20,30,40,.12);
    padding:10px 16px calc(env(safe-area-inset-bottom) + 14px);
    transform:translateY(0);transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:none;
    max-height:80vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  }
  #sheet.floating{max-height:80vh;overflow-y:auto;}
  #sheet.collapsed{transform:translateY(calc(100% - 46px));}
  .grab-zone{padding:8px 0 12px;margin:-8px 0 4px;cursor:grab;display:flex;flex-direction:column;align-items:center;gap:4px;touch-action:none;}
  .grab-zone:active{cursor:grabbing;}
  #sheet.floating{left:auto;right:auto;bottom:auto;transform:none;width:360px;max-width:92vw;border:1.5px solid var(--line);border-radius:16px;box-shadow:0 12px 40px rgba(20,30,40,.22);}
  .grab{width:42px;height:4px;background:var(--line);border-radius:3px;transition:.2s;}
  .grab-zone:active .grab{background:var(--accent);width:52px;}
  .peek{font-family:'IBM Plex Mono';font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);opacity:0;height:0;transition:.2s;}
  #sheet.collapsed .peek{opacity:1;height:auto;}
  .sheet-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .sheet-head .count{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-soft);letter-spacing:.5px;}
  .sheet-head .title{font-size:16px;font-weight:800;letter-spacing:-.3px;}

  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;font-family:'IBM Plex Mono';font-size:12px;font-weight:500;
    padding:8px 12px;border-radius:10px;border:1.5px solid var(--line);
    background:#fff;cursor:pointer;display:flex;align-items:center;gap:7px;white-space:nowrap;
  }
  .chip .sw{width:11px;height:11px;border-radius:3px;}
  .chip.sel{border-color:var(--ink);background:var(--ink);color:var(--paper);}

  /* selected room editor */
  #editor{display:none;margin-top:4px;}
  .ed-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ed-label{font-family:'IBM Plex Mono';font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-soft);min-width:48px;}
  .relabel{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;flex:1;}
  .relabel::-webkit-scrollbar{display:none;}
  .rl{flex:0 0 auto;font-family:'IBM Plex Mono';font-size:11px;padding:7px 10px;border-radius:9px;border:1.5px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;}
  .rl .sw{width:10px;height:10px;border-radius:3px;}
  .rl.on{border-color:var(--ink);background:var(--paper-2);font-weight:600;}
  .ed-actions{display:flex;gap:8px;}
  .mini{font-family:'IBM Plex Mono';font-size:12px;font-weight:500;padding:10px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;cursor:pointer;flex:1;display:flex;align-items:center;justify-content:center;gap:7px;}
  .mini svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;}
  .mini.danger{color:var(--accent);border-color:var(--accent-soft);}
  .mini:active{background:var(--paper-2);}

  /* toolbar */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .tool{flex:1 1 28%;font-family:'Archivo';font-weight:700;font-size:12px;padding:11px 6px;border-radius:11px;border:1.5px solid var(--ink);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;}
  .tool.wide{flex:1 1 100%;flex-direction:row;justify-content:center;background:var(--paper-2);border-style:dashed;}
  .tool svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.7;fill:none;}
  .tool:active{background:var(--paper-2);}
  .tool.primary{background:var(--accent);color:#fff;border-color:var(--accent);border-style:solid;}
  .tool.on{background:var(--ink);color:var(--paper);border-color:var(--ink);border-style:solid;}

  #banner{
    display:none;position:absolute;top:12px;left:50%;transform:translateX(-50%);
    z-index:25;background:var(--accent);color:#fff;
    font-family:'IBM Plex Mono';font-size:12px;font-weight:500;letter-spacing:.3px;
    padding:9px 16px;border-radius:10px;box-shadow:var(--shadow);
    max-width:90vw;text-align:center;line-height:1.4;
  }

  /* step bar */
  #scaleRow{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 10px;border:1.5px solid var(--line);border-radius:10px;background:#fff;}
  #scaleRow .scale-help{font-family:'IBM Plex Mono';font-size:12px;color:var(--ink-soft);}
  #scaleInput{width:74px;font-family:'IBM Plex Mono';font-size:14px;font-weight:600;padding:6px 8px;border:1.5px solid var(--line);border-radius:8px;background:var(--paper);color:var(--ink);}
  #scaleInput:focus{outline:none;border-color:var(--accent);}
  #stepbar{display:flex;gap:6px;margin-bottom:12px;}
  .step{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'IBM Plex Mono';font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);padding:7px 4px;border-radius:9px;border:1.5px solid var(--line);background:#fff;}
  .step .dot{width:18px;height:18px;border-radius:50%;background:var(--line);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;}
  .step.active{border-color:var(--ink);color:var(--ink);font-weight:600;}
  .step.active .dot{background:var(--accent);}
  .step.done .dot{background:var(--ok);}

  /* AI refine bar */
  #refineBar{display:none;gap:8px;margin-top:10px;}
  #refineInput{flex:1;font-family:'IBM Plex Mono';font-size:13px;padding:11px 13px;border-radius:11px;border:1.5px solid var(--line);background:#fff;color:var(--ink);}
  #refineInput:focus{outline:none;border-color:var(--accent);}
  #refineSend{font-family:'Archivo';font-weight:700;font-size:13px;padding:0 16px;border-radius:11px;border:none;background:var(--ink);color:var(--paper);cursor:pointer;}

  /* export panel */
  #exportPanel{display:none;}
  .ex-json{font-family:'IBM Plex Mono';font-size:10.5px;line-height:1.5;background:#fff;border:1.5px solid var(--line);border-radius:11px;padding:12px;max-height:30vh;overflow:auto;white-space:pre;color:var(--ink-soft);margin-bottom:10px;}

  .toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 18px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono';font-size:12px;padding:10px 16px;border-radius:10px;opacity:0;transition:.25s;z-index:90;pointer-events:none;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .err{font-family:'IBM Plex Mono';font-size:12px;color:var(--accent);text-align:center;padding:14px;line-height:1.5;}

  @media(min-width:760px){
    .drop{max-height:420px;}
    #sheet{max-width:520px;left:50%;transform:translateX(-50%);border-radius:20px;bottom:18px;border:1.5px solid var(--line);}
    #sheet.collapsed{transform:translateX(-50%) translateY(calc(100% - 46px + 18px));}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Tracer<span class="dot"></span></h1>
    <small>floor plan → rooms</small>
  </div>
  <button class="hbtn" id="restartBtn" style="display:none" onclick="restart()">New</button>
</header>

<div id="stage">

  <!-- UPLOAD -->
  <div id="upload">
    <div class="drop" id="drop" onclick="pickFile()">
      <span class="corner tl"></span><span class="corner tr"></span>
      <span class="corner bl"></span><span class="corner br"></span>
      <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0L7 9m5-5l5 5"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
      <div class="big">Drop a floor plan</div>
      <div class="sub">Snap or upload a plan image — the AI traces the rooms for you</div>
    </div>
    <div class="uprow">
      <button class="btn btn-accent" onclick="pickCamera()">
        <svg viewBox="0 0 24 24"><path d="M3 7h3l2-2h8l2 2h3v12H3z"/><circle cx="12" cy="13" r="3.5"/></svg>
        Camera
      </button>
      <button class="btn btn-primary" onclick="pickFile()">
        <svg viewBox="0 0 24 24"><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/><path d="M12 4v12m0-12L8 8m4-4l4 4"/></svg>
        Upload
      </button>
    </div>
    <div class="hint-line">JPG · PNG · GIF — works best with a clear, straight-on plan</div>
  </div>

  <!-- WORKSPACE -->
  <div id="work">
    <div id="canvasWrap">
      <div class="imgbox" id="imgbox">
        <img id="planImg" alt="floor plan">
        <canvas id="overlay"></canvas>
      </div>
    </div>
    <div id="zoomctl">
      <button onclick="zoomBy(1.25)" aria-label="Zoom in"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></button>
      <button onclick="zoomBy(0.8)" aria-label="Zoom out"><svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg></button>
      <button onclick="resetView()" aria-label="Fit"><svg viewBox="0 0 24 24"><path d="M4 9V5a1 1 0 011-1h4M20 9V5a1 1 0 00-1-1h-4M4 15v4a1 1 0 001 1h4M20 15v4a1 1 0 01-1 1h-4"/></svg></button>
    </div>
    <div id="loading">
      <div class="scan"></div>
      <div id="loadtext">Reading the plan…</div>
    </div>
    <div id="banner"></div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div id="sheet">
  <div class="grab-zone" id="grabZone">
    <div class="grab"></div>
    <div class="peek" id="peekLabel">tap to expand · drag to move</div>
  </div>

  <div id="errBox" class="err" style="display:none"></div>

  <div id="mainView">
    <div id="stepbar">
      <div class="step" data-step="outline"><span class="dot">1</span>Outline</div>
      <div class="step" data-step="seeds"><span class="dot">2</span>Rooms</div>
      <div class="step" data-step="review"><span class="dot">3</span>Review</div>
    </div>

    <div id="scaleRow">
      <span class="ed-label">Scale</span>
      <span class="scale-help">Apartment width</span>
      <input id="scaleInput" type="number" min="1" step="0.5" value="10" inputmode="decimal">
      <span class="scale-help">m</span>
    </div>

    <div class="sheet-head">
      <div class="title" id="sheetTitle">Rooms</div>
      <div class="count" id="roomCount"></div>
    </div>

    <div class="chips" id="roomChips"></div>

    <!-- per-room editor -->
    <div id="editor">
      <div class="ed-row">
        <span class="ed-label">Type</span>
        <div class="relabel" id="relabel"></div>
      </div>
      <div class="ed-actions">
        <button class="mini" onclick="duplicateRoom()">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
          Duplicate
        </button>
        <button class="mini danger" onclick="deleteRoom()">
          <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2m-9 0l1 13a1 1 0 001 1h6a1 1 0 001-1l1-13"/></svg>
          Delete
        </button>
        <button class="mini" onclick="deselect()">
          <svg viewBox="0 0 24 24"><path d="M5 12h14"/></svg>
          Done
        </button>
      </div>
    </div>

    <!-- context actions (filled per step) -->
    <div class="toolbar" id="actionRow"></div>

    <!-- AI refine -->
    <div id="refineBar">
      <input id="refineInput" placeholder="e.g. you missed the kitchen…" />
      <button id="refineSend" onclick="refineWithAI()">Go</button>
    </div>
  </div>

  <!-- EXPORT -->
  <div id="exportPanel">
    <div class="sheet-head">
      <div class="title">Export</div>
      <button class="hbtn" onclick="closeExport()">Back</button>
    </div>
    <div class="ex-json mono" id="jsonOut"></div>
    <div class="toolbar">
      <button class="tool" onclick="copyJSON()">
        <svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 012-2h10"/></svg>
        Copy JSON
      </button>
      <button class="tool" onclick="downloadJSON()">
        <svg viewBox="0 0 24 24"><path d="M12 4v12m0 0l-4-4m4 4l4-4"/><path d="M4 18h16"/></svg>
        Download
      </button>
      <button class="tool primary" onclick="sendToChecker()">
        <svg viewBox="0 0 24 24"><path d="M5 12h14m-6-6l6 6-6 6"/></svg>
        To checker
      </button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
<div class="toast" id="toast"></div>

<script>
/* ============ CONFIG ============ */
const API_BASE = "";
const ANALYSE_URL = API_BASE + "/api/analyse-image";
const CHECKER_URL = API_BASE + "/";

/* ============ ROOM TYPES ============ */
const TYPES = [
  {layer:"APT_ROOM_LIVING",      label:"Living",   color:"#2B5FCE"},
  {layer:"APT_ROOM_MAINBED",     label:"Main Bed", color:"#7A4FD0"},
  {layer:"APT_ROOM_BED1",        label:"Bed 1",    color:"#9B59B6"},
  {layer:"APT_ROOM_BED2",        label:"Bed 2",    color:"#B574C9"},
  {layer:"APT_ROOM_BED3",        label:"Bed 3",    color:"#C98FD6"},
  {layer:"APT_ROOM_BATHROOM",    label:"Bath",     color:"#1FA38A"},
  {layer:"APT_ROOM_ENSUITE",     label:"Ensuite",  color:"#23B5A0"},
  {layer:"APT_ROOM_LAUNDRY",     label:"Laundry",  color:"#3FB0C9"},
  {layer:"APT_ROOM_ENTRY",       label:"Entry",    color:"#8A929A"},
  {layer:"APT_STORAGE_DESIGNATED",label:"Storage", color:"#C08A2E"},
  {layer:"APT_POS",              label:"Balcony",  color:"#5BA85B"},
  {layer:"APT_UNKNOWN",          label:"?",        color:"#9AA0A6"},
];
const typeByLayer = Object.fromEntries(TYPES.map(t=>[t.layer,t]));
function typeFor(layer){ return typeByLayer[layer] || {layer:layer,label:layer,color:"#E8542B"}; }

/* ============ MODEL (image-fraction coords throughout) ============ */
const WELD_TOL = 0.018;
let perimeter = [];      // [[x,y],...] apartment outline
let rooms = [];          // {id, layer, vertices:[[x,y]...]}
let openings = [];       // {type, segment:[[x,y],[x,y]]}
let seeds = [];          // rooms-to-build: [{a:[x,y], b:[x,y]}]  diagonal-box pairs
let seedDraft = null;    // {a:[x,y]} — first corner placed, awaiting second
let walls = {h:[], v:[]};         // detected wall positions (image fractions)
let grid  = {x:[], y:[]};         // adaptive snap grid (image fractions)
let snapEnabled = true;
let showWalls = false;
let meta = {scale:null, north:null};
let selectedId = null;   // room id | "PERIMETER" | null
let imgData=null, imgMime="image/jpeg", uid=1;

let step = 'outline';    // 'outline' | 'seeds' | 'review'
let drawMode=false, drawPts=[];   // tracing perimeter
let seedMode=false;
let weldLock=true;       // edits drag shared edges of adjacent rooms too
let vertexMode='none';   // 'none' | 'add' | 'del' — next tap edits a vertex
let openingMode='none';  // 'none' | 'door' | 'window'
let winFirst=null, winEdge=null;   // window: first click + the edge it locked to
let selOpening=-1, dragOpen=null;  // selected/dragging opening
let planWidthM=10;       // apartment overall width in metres (set at start)
let showOpenings=true;

/* ============ ELEMENTS ============ */
const img=document.getElementById('planImg');
const canvas=document.getElementById('overlay');
const ctx=canvas.getContext('2d');
const imgbox=document.getElementById('imgbox');

/* ============ UPLOAD ============ */
function pickFile(){ document.getElementById('fileInput').click(); }
function pickCamera(){ document.getElementById('camInput').click(); }
['fileInput','camInput'].forEach(id=>document.getElementById(id).addEventListener('change',e=>{const f=e.target.files[0];if(f)loadImage(f);}));
const drop=document.getElementById('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
drop.addEventListener('drop',e=>{const f=e.dataTransfer.files[0];if(f)loadImage(f);});
(function(){ const s=document.getElementById('scaleInput'); if(s){ s.addEventListener('input',()=>{ const v=parseFloat(s.value); if(isFinite(v)&&v>0) planWidthM=v; }); } })();

function loadImage(file){
  imgMime=file.type||"image/jpeg";
  const reader=new FileReader();
  reader.onload=e=>{
    imgData=e.target.result.split(',')[1];
    img.src=e.target.result;
    img.onload=()=>{
      document.getElementById('upload').style.display='none';
      document.getElementById('work').style.display='block';
      document.getElementById('restartBtn').style.display='block';
      resetView(); resizeCanvas();
      try{ detectWalls(); }catch(e){ console.warn('wall detect failed',e); }
      openSheet(); enterOutline();
    };
  };
  reader.readAsDataURL(file);
}

/* ============ CANVAS / ZOOM / PAN ============ */
function resizeCanvas(){ canvas.width=img.clientWidth; canvas.height=img.clientHeight; canvas.style.width=img.clientWidth+'px'; canvas.style.height=img.clientHeight+'px'; draw(); }
window.addEventListener('resize',()=>{ if(img.src) resizeCanvas(); });
let view={scale:1,tx:0,ty:0};
function applyView(){ imgbox.style.transform=`translate(${view.tx}px,${view.ty}px) scale(${view.scale})`; }
function resetView(){ view={scale:1,tx:0,ty:0}; applyView(); }
function zoomAbout(f,cx,cy){ const r=imgbox.getBoundingClientRect(); const ox=cx-r.left,oy=cy-r.top; const ns=Math.max(0.5,Math.min(6,view.scale*f)); const k=ns/view.scale; view.tx-=ox*(k-1); view.ty-=oy*(k-1); view.scale=ns; applyView(); }
function zoomBy(f){ const w=document.getElementById('canvasWrap').getBoundingClientRect(); zoomAbout(f,w.left+w.width/2,w.top+w.height/2); }
document.getElementById('canvasWrap').addEventListener('wheel',e=>{ if(!img.src)return; e.preventDefault(); zoomAbout(e.deltaY<0?1.12:0.89,e.clientX,e.clientY); },{passive:false});

/* right-click / middle-click drag to pan (Rhino-style) */
(function(){
  const wrap=document.getElementById('canvasWrap'); let panning=null;
  wrap.addEventListener('contextmenu',e=>e.preventDefault());
  wrap.addEventListener('pointerdown',e=>{
    if(e.button===2 || e.button===1){ panning={x:e.clientX,y:e.clientY}; wrap.setPointerCapture(e.pointerId); e.preventDefault(); }
  });
  wrap.addEventListener('pointermove',e=>{
    if(!panning) return;
    view.tx+=(e.clientX-panning.x); view.ty+=(e.clientY-panning.y); applyView();
    panning={x:e.clientX,y:e.clientY};
  });
  const stop=()=>{ panning=null; };
  wrap.addEventListener('pointerup',stop); wrap.addEventListener('pointercancel',stop);
})();

/* ============ STEP MACHINE ============ */
function setStepUI(){
  const order=['outline','seeds','review'];
  document.querySelectorAll('.step').forEach(el=>{
    const s=el.dataset.step, si=order.indexOf(s), ci=order.indexOf(step);
    el.classList.toggle('active', s===step);
    el.classList.toggle('done', si<ci);
  });
  document.getElementById('sheetTitle').textContent =
    step==='outline'?'Step 1 — Outline' : step==='seeds'?'Step 2 — Mark rooms' : 'Step 3 — Review';
  const sr=document.getElementById('scaleRow'); if(sr) sr.style.display = step==='outline'?'flex':'none';
  renderActions();
}
function enterOutline(){
  step='outline'; selectedId=null; seedMode=false;
  drawMode=true; drawPts=[]; perimeter=[]; rooms=[]; seeds=[];
  setStepUI(); expandSheet();
  setBanner('Trace the apartment boundary: tap each corner, then “Finish outline”.');
  draw();
}
function enterSeeds(){
  step='seeds'; drawMode=false; selectedId=null; seedMode=true; seeds=[]; seedDraft=null;
  setStepUI();
  setBanner('Tap two opposite corners of each room — top-left then bottom-right. Tap a finished room to remove it.');
  draw();
}
function enterReview(){
  step='review'; drawMode=false; seedMode=false;
  setStepUI(); setBanner(null); draw();
}

/* dynamic action row per step */
function renderActions(){
  const row=document.getElementById('actionRow'); row.innerHTML='';
  const mk=(cls,label,svg,fn)=>{ const b=document.createElement('button'); b.className='tool'+(cls?(' '+cls):''); b.innerHTML=`<svg viewBox="0 0 24 24">${svg}</svg>${label}`; b.onclick=fn; return b; };
  if(step==='outline'){
    row.appendChild(mk('wide','Finish outline','<path d="M5 12l5 5L20 7"/>', finishDraw));
    row.appendChild(mk('','Fit to walls (AI)','<path d="M12 3v3m0 12v3m9-9h-3M6 12H3m13-6l-2 2M9 14l-2 2m12 0l-2-2M9 10L7 8"/><circle cx="12" cy="12" r="3"/>', fitBoundary));
    row.appendChild(mk('','Redo','<path d="M4 9h11a5 5 0 010 10H9"/><path d="M4 9l4-4M4 9l4 4"/>', enterOutline));
    row.appendChild(mk('primary','Next: rooms →','<path d="M5 12h14m-6-6l6 6-6 6"/>', ()=>{ if(perimeter.length<3){toast('Trace the outline first');return;} enterSeeds(); }));
  } else if(step==='seeds'){
    row.appendChild(mk('wide primary','Generate rooms (AI labels)','<path d="M12 3v3m0 12v3m9-9h-3M6 12H3m13-6l-2 2M9 14l-2 2m12 0l-2-2M9 10L7 8"/><circle cx="12" cy="12" r="3"/>', generateRooms));
    row.appendChild(mk(snapEnabled?'on':'','Snap','<path d="M4 12h16M12 4v16"/><circle cx="12" cy="12" r="2"/>', ()=>{ snapEnabled=!snapEnabled; renderActions(); toast(snapEnabled?'Snapping on (walls + grid)':'Snapping off'); }));
    row.appendChild(mk(showWalls?'on':'','Show walls','<rect x="4" y="4" width="16" height="16" rx="1"/><path d="M4 9h16M4 15h16"/>', ()=>{ showWalls=!showWalls; renderActions(); draw(); }));
    row.appendChild(mk('','Clear rooms','<path d="M4 7h16M9 7V5a2 2 0 012-2h2a2 2 0 012 2v2"/>', ()=>{ seeds=[]; seedDraft=null; draw(); updateSeedCount(); }));
    row.appendChild(mk('','← Outline','<path d="M19 12H5m6-6l-6 6 6 6"/>', enterOutline));
  } else {
    row.appendChild(mk('wide','Merge & align same spaces (AI)','<path d="M8 7h8M8 12h8M8 17h8"/><path d="M4 7l1 1 1-1M4 17l1-1 1 1"/>', mergeSpaces));
    row.appendChild(mk('wide','Square up & align edges','<path d="M4 4h16v16H4z"/><path d="M9 4v16M15 4v16M4 9h16M4 15h16"/>', ()=>squareUp(true)));
    const lockBtn=mk(weldLock?'on':'', weldLock?'Linked':'Unlinked',
      weldLock?'<path d="M7 11V8a5 5 0 0110 0v3"/><rect x="5" y="11" width="14" height="9" rx="2"/>'
              :'<path d="M7 11V8a5 5 0 019-2"/><rect x="5" y="11" width="14" height="9" rx="2"/>',
      toggleWeldLock);
    row.appendChild(lockBtn);
    row.appendChild(mk(vertexMode==='add'?'on':'','Add pt','<path d="M12 5v14M5 12h14"/>', ()=>setVertexMode('add')));
    row.appendChild(mk(vertexMode==='del'?'on':'','Del pt','<path d="M5 12h14"/>', ()=>setVertexMode('del')));
    row.appendChild(mk('','Add room','<path d="M4 4h16v16H4z"/><path d="M9 12h6"/>', ()=>{commit();addRoom();}));
    row.appendChild(mk('','Edit outline','<path d="M3 7l4-4 5 3 4-2 5 4v9l-4 4-5-3-4 2-5-4z"/>', ()=>{ selectPerimeter(); }));
    row.appendChild(mk('','Doors/Win','<rect x="4" y="4" width="16" height="16" rx="1"/><path d="M4 12h16M12 4v16"/>', toggleOpenings));

}
function toggleWeldLock(){
  weldLock=!weldLock;
  renderActions();
  toast(weldLock?'Shared edges move neighbours too':'Edits affect only the selected room');
}
function setVertexMode(m){
  vertexMode = (vertexMode===m)?'none':m;
  renderActions();
  if(vertexMode==='add') setBanner('Tap an edge of the selected room/outline to add a corner');
  else if(vertexMode==='del') setBanner('Tap a corner of the selected room/outline to remove it');
  else setBanner(null);
}

/* ============ AI CALLS ============ */
function showLoading(t){ document.getElementById('loadtext').textContent=t||'Working…'; document.getElementById('loading').style.display='flex'; }
function hideLoading(){ document.getElementById('loading').style.display='none'; }

async function callAI(payload, loadingMsg){
  showLoading(loadingMsg); hideErr();
  try{
    const res=await fetch(ANALYSE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();
    hideLoading();
    if(data.error) throw new Error(data.error);
    return data;
  }catch(err){ hideLoading(); showErr('AI step failed: '+err.message); return null; }
}

async function fitBoundary(){
  if(perimeter.length<3){ toast('Trace the outline first'); return; }
  const data=await callAI({task:'fit_boundary', image:imgData, media_type:imgMime, boundary:perimeter.map(rnd2)}, 'Snapping outline to walls…');
  if(data && Array.isArray(data.perimeter) && data.perimeter.length>=3){
    perimeter=data.perimeter.filter(p=>Array.isArray(p)&&p.length===2);
    draw(); toast('Outline snapped — nudge corners if needed');
  } else if(data){ toast('AI returned no outline; keep your traced one'); }
}

async function generateRooms(){
  if(seeds.length<1){ toast('Place at least one room (two taps)'); return; }
  if(seedDraft){ toast('Finish the current room first (tap its opposite corner)'); return; }
  showLoading('Labelling rooms · finding doors · finding windows…'); hideErr();
  const base={ image:imgData, media_type:imgMime, boundary:perimeter.map(rnd2) };

  // build geometry deterministically from the user's diagonal boxes,
  // already snapped to walls/grid at place-time. AI only labels them.
  const draftRooms = seeds.map((s,i)=>({
    idx:i,
    bbox:[rnd(s.a[0]),rnd(s.a[1]),rnd(s.b[0]),rnd(s.b[1])],
    vertices:[[s.a[0],s.a[1]],[s.b[0],s.a[1]],[s.b[0],s.b[1]],[s.a[0],s.b[1]]]
  }));

  try{
    const [labelData, doorsData, winData] = await Promise.all([
      postAI({ ...base, task:'label_rooms', rooms:draftRooms.map(r=>({idx:r.idx,bbox:r.bbox})) }),
      postAI({ ...base, task:'doors' }),
      postAI({ ...base, task:'windows' }),
    ]);
    hideLoading();
    if(labelData && labelData.error) throw new Error(labelData.error);

    commit();
    const labelByIdx = {};
    (labelData && labelData.rooms || []).forEach(r=>{ if(typeof r.idx==='number') labelByIdx[r.idx]=r; });
    rooms = draftRooms.map(d=>{
      const lbl = labelByIdx[d.idx] || {};
      return { id:uid++, layer: lbl.layer || "APT_UNKNOWN", vertices: d.vertices.map(v=>[v[0],v[1]]) };
    });
    if(labelData && labelData.scale) meta.scale=labelData.scale;
    if(labelData && labelData.north) meta.north=labelData.north;

    squareUp(false);   // align edges and weld
    rebuildGrid();     // update grid from accepted rooms

    const dOpen=(doorsData&&doorsData.openings)||[];
    const wOpen=(winData&&winData.openings)||[];
    openings=[...dOpen.map(o=>({type:'door',segment:o.segment})),
              ...wOpen.map(o=>({type:'window',segment:o.segment}))]
             .filter(o=>o.segment&&o.segment.length===2&&o.segment.every(p=>Array.isArray(p)&&p.length===2));
    snapOpenings();

    selectedId=null; weldAll(); renderChips(); renderEditor(); draw();
    enterReview();
  }catch(err){ hideLoading(); showErr('Generation failed: '+err.message); }
}
// fire a request and return parsed data (or {error}); no own loading UI
async function postAI(payload){
  try{ const res=await fetch(ANALYSE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); return await res.json(); }
  catch(err){ return {error:String(err)}; }
}

async function mergeSpaces(){
  if(rooms.length<2){ toast('Need at least two rooms'); return; }
  const data=await callAI({task:'merge', image:imgData, media_type:imgMime,
                            boundary:perimeter.map(rnd2), rooms:exportRoomsForAI()},
                           'Merging open-plan spaces…');
  if(!data) return;
  ingestRooms(data);
  toast('Open spaces merged');
}

async function refineWithAI(){
  const v=document.getElementById('refineInput').value.trim();
  if(!v){ toast('Type what to fix first'); return; }
  document.getElementById('refineBar').style.display='none';
  document.getElementById('refineInput').value='';
  const data=await callAI({task:'rooms_from_seeds', image:imgData, media_type:imgMime,
                            boundary:perimeter.map(rnd2), seeds:seeds.map(s=>[rnd(s.x),rnd(s.y)]),
                            hint:v, previous:exportRoomsForAI()}, 'Refining…');
  if(data) ingestRooms(data);
}

function ingestRooms(data){
  rooms=(data.rooms||[]).map(r=>({id:uid++, layer:r.layer||"APT_ROOM_LIVING",
        vertices:(r.vertices||[]).filter(v=>Array.isArray(v)&&v.length===2)})).filter(r=>r.vertices.length>=3);
  if(Array.isArray(data.openings)) openings=data.openings.filter(o=>o&&o.segment&&o.segment.length===2&&o.segment.every(p=>Array.isArray(p)&&p.length===2)).map(o=>({type:o.type,segment:o.segment}));
  if(data.scale) meta.scale=data.scale;
  if(data.north) meta.north=data.north;
  selectedId=null; weldAll(); renderChips(); renderEditor(); draw();
}
function exportRoomsForAI(){ return rooms.map(r=>({layer:r.layer,label:typeFor(r.layer).label,vertices:r.vertices.map(v=>[rnd(v[0]),rnd(v[1])])})); }
function rnd(n){return Math.round(n*1000)/1000;}
function rnd2(p){return [rnd(p[0]),rnd(p[1])];}

/* ============ WELDING ============ */
function allRings(){ return [perimeter, ...rooms.map(r=>r.vertices)]; }
function weldAll(){
  const all=allRings();
  for(let a=0;a<all.length;a++) for(let i=0;i<all[a].length;i++){
    const A=all[a][i];
    for(let b=0;b<all.length;b++) for(let j=0;j<all[b].length;j++){
      if(a===b&&i===j) continue;
      const B=all[b][j];
      if(Math.hypot(A[0]-B[0],A[1]-B[1])<WELD_TOL){ B[0]=A[0]; B[1]=A[1]; }
    }
  }
}
function coincident(x,y){ const refs=[]; allRings().forEach(ring=>ring.forEach((p,i)=>{ if(Math.hypot(p[0]-x,p[1]-y)<WELD_TOL) refs.push([ring,i]); })); return refs; }
// group of point-refs to move when dragging: all coincident if locked, else only the active ring's own point
function dragGroup(ring, idx){
  if(weldLock) return coincident(ring[idx][0], ring[idx][1]);
  return [[ring, idx]];
}

/* ============ WALL DETECTION ============
   Project the image to a grayscale buffer, then sum dark pixels along each
   row and each column. Peaks = horizontal/vertical wall lines. Cheap and
   surprisingly robust on clean plan drawings.                             */
function detectWalls(){
  if(!img.naturalWidth){ return; }
  const T=600;                                           // working resolution
  const sx=img.naturalWidth, sy=img.naturalHeight;
  const sc=Math.min(T/sx, T/sy, 1);
  const w=Math.max(64,Math.round(sx*sc)), h=Math.max(64,Math.round(sy*sc));
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  const cx=c.getContext('2d'); cx.drawImage(img,0,0,w,h);
  const id=cx.getImageData(0,0,w,h).data;
  // 1=dark/ink, 0=light
  const dark=new Uint8Array(w*h);
  for(let i=0,p=0;i<id.length;i+=4,p++){
    const v=(id[i]+id[i+1]+id[i+2])/3;
    dark[p]=v<170?1:0;
  }
  // row & column sums
  const rowS=new Float32Array(h), colS=new Float32Array(w);
  for(let y=0;y<h;y++) for(let x=0;x<w;x++) if(dark[y*w+x]){ rowS[y]++; colS[x]++; }
  // a row is a horizontal wall if many of its pixels are dark
  const rowT=w*0.20, colT=h*0.20;
  walls.h = peakPositions(rowS, rowT, h);     // image fractions in y
  walls.v = peakPositions(colS, colT, w);     // image fractions in x
}
function peakPositions(arr, thresh, dim){
  const peaks=[], MIN_GAP=Math.max(3, Math.round(dim*0.012));
  let i=0;
  while(i<arr.length){
    if(arr[i]>=thresh){
      let j=i, best=i;
      while(j<arr.length && arr[j]>=thresh){ if(arr[j]>arr[best]) best=j; j++; }
      if(!peaks.length || best-peaks[peaks.length-1]>=MIN_GAP) peaks.push(best);
      i=j;
    } else i++;
  }
  return peaks.map(p=>p/dim);
}

/* adaptive grid: start with boundary, grow with every accepted room edge */
function rebuildGrid(){
  const xs=new Set(), ys=new Set();
  const push=(ring)=>{ ring.forEach(([x,y])=>{ xs.add(round3(x)); ys.add(round3(y)); }); };
  if(perimeter.length) push(perimeter);
  rooms.forEach(r=>push(r.vertices));
  grid.x=[...xs].sort((a,b)=>a-b);
  grid.y=[...ys].sort((a,b)=>a-b);
}
function round3(n){return Math.round(n*1000)/1000;}

/* snap a fraction to the closest line: grid first (anchored by user accepts),
   walls second (image evidence), boundary corners always.                  */
function snapCoord(v, axis, tolGrid=0.012, tolWall=0.014){
  // grid (highest priority — same surface as boundary corners)
  const g = axis==='x' ? grid.x : grid.y;
  let best=null, bd=tolGrid;
  for(const c of g){ const d=Math.abs(v-c); if(d<bd){bd=d; best=c;} }
  if(best!=null) return best;
  // wall lines
  const wl = axis==='x' ? walls.v : walls.h;
  let bestW=null, bw=tolWall;
  for(const c of wl){ const d=Math.abs(v-c); if(d<bw){bw=d; bestW=c;} }
  return bestW!=null ? bestW : v;
}
function snapPoint(p){ if(!snapEnabled) return p.slice(); return [snapCoord(p[0],'x'), snapCoord(p[1],'y')]; }

/* ============ SQUARE-UP / ALIGN ============
   Resolve a rough layout into a clean rectilinear drawing:
   1) rectilinearise — snap near-horizontal/vertical edges to exactly H/V
   2) cluster vertex X's and Y's and snap each cluster to a shared value,
      so adjacent rooms end up sharing exact wall coordinates
   3) weld coincident corners.                                         */
function squareUp(announce){
  if(announce!==false) commit();
  const rings=allRings();
  rings.forEach(rectilinearize);          // every edge -> strict H or V
  snapAxis(rings, 0, 0.022);              // align shared walls across rooms (X)
  snapAxis(rings, 1, 0.022);              // and Y
  weldAll();
  snapOpenings();
  if(announce!==false){ draw(); toast('Squared up & aligned'); }
}
// snap every edge of a ring to a true horizontal or vertical line.
// each vertex takes its X from its vertical edge and its Y from its horizontal edge,
// so 4-pt rooms become rectangles and 6/8-pt rooms become clean right-angled polygons.
function rectilinearize(ring){
  const W=canvas.width||1, H=canvas.height||1, n=ring.length;
  if(n<4) return;
  const orient=[];
  for(let i=0;i<n;i++){ const a=ring[i], b=ring[(i+1)%n];
    orient[i] = Math.abs((b[0]-a[0])*W) >= Math.abs((b[1]-a[1])*H) ? 'H' : 'V'; }
  const nx=ring.map(p=>p[0]), ny=ring.map(p=>p[1]);
  for(let i=0;i<n;i++){
    const j=(i+1)%n;
    if(orient[i]==='H'){ const my=(ring[i][1]+ring[j][1])/2; ny[i]=my; ny[j]=my; }
    else { const mx=(ring[i][0]+ring[j][0])/2; nx[i]=mx; nx[j]=mx; }
  }
  for(let i=0;i<n;i++){ ring[i][0]=nx[i]; ring[i][1]=ny[i]; }
}
function snapAxis(rings, axis, tol){
  const all=[]; rings.forEach(r=>r.forEach(p=>all.push(p)));
  const vals=all.map(p=>p[axis]).sort((a,b)=>a-b);
  // build clusters of values within tol, snap to cluster mean
  const clusters=[]; let cur=[vals[0]];
  for(let i=1;i<vals.length;i++){
    if(vals[i]-cur[cur.length-1]<tol) cur.push(vals[i]);
    else { clusters.push(cur); cur=[vals[i]]; }
  }
  clusters.push(cur);
  const means=clusters.map(c=>c.reduce((s,v)=>s+v,0)/c.length);
  all.forEach(p=>{
    // find nearest cluster mean
    let best=means[0],bd=Math.abs(p[axis]-means[0]);
    for(const m of means){ const d=Math.abs(p[axis]-m); if(d<bd){bd=d;best=m;} }
    if(bd<tol) p[axis]=best;
  });
}

/* snap each opening to the nearest room/perimeter edge and lay it along that wall */
function snapOpenings(){
  const W=canvas.width||1, H=canvas.height||1;
  const edges=[];
  allRings().forEach(ring=>{ for(let i=0;i<ring.length;i++){ edges.push([ring[i],ring[(i+1)%ring.length]]); } });
  if(!edges.length) return;
  openings.forEach(o=>{
    const mid=[(o.segment[0][0]+o.segment[1][0])/2,(o.segment[0][1]+o.segment[1][1])/2];
    let best=null,bd=1e9;
    edges.forEach(([a,b])=>{ const d=distToSeg(mid[0],mid[1],a[0],a[1],b[0],b[1]); if(d<bd){bd=d;best=[a,b];} });
    if(best && bd<0.06){
      // project both endpoints onto the chosen edge line
      o.segment=o.segment.map(pt=>projectOnSeg(pt,best[0],best[1]));
    }
  });
}
function projectOnSeg(p,a,b){
  const dx=b[0]-a[0],dy=b[1]-a[1],l2=dx*dx+dy*dy;
  let t=l2?((p[0]-a[0])*dx+(p[1]-a[1])*dy)/l2:0; t=Math.max(0,Math.min(1,t));
  return [a[0]+t*dx, a[1]+t*dy];
}
function nearestEdge(px,py){
  let best=null,bd=1e9;
  allRings().forEach(ring=>{ for(let i=0;i<ring.length;i++){ const a=ring[i],b=ring[(i+1)%ring.length]; const d=distToSeg(px,py,a[0],a[1],b[0],b[1]); if(d<bd){bd=d;best={a,b};} } });
  return best;
}
function setOpeningMode(m){
  openingMode=(openingMode===m)?'none':m; vertexMode='none'; winFirst=null; winEdge=null;
  selectedId=null; selOpening=-1; renderActions();
  if(openingMode==='door') setBanner('Tap a wall to drop a door. Pick the tool again to stop.');
  else if(openingMode==='window') setBanner('Tap the two ends of a window (snaps to the wall).');
  else setBanner(null);
  draw();
}
function placeDoor(px,py){
  const e=nearestEdge(px,py); if(!e) return;
  const c=projectOnSeg([px,py],e.a,e.b);
  const W=canvas.width||1,H=canvas.height||1;
  let dx=(e.b[0]-e.a[0])*W, dy=(e.b[1]-e.a[1])*H; const L=Math.hypot(dx,dy)||1; dx/=L; dy/=L;
  const half=16; // px ~ a doorway
  commit();
  openings.push({type:'door',segment:[[c[0]-dx*half/W,c[1]-dy*half/H],[c[0]+dx*half/W,c[1]+dy*half/H]]});
  draw();
}
function windowClick(px,py){
  if(!winFirst){
    winEdge=nearestEdge(px,py);
    winFirst = winEdge ? projectOnSeg([px,py],winEdge.a,winEdge.b) : [px,py];
    setBanner('Window: tap the other end'); draw();
  } else {
    const end = winEdge ? projectOnSeg([px,py],winEdge.a,winEdge.b) : [px,py];
    commit(); openings.push({type:'window',segment:[winFirst,end]});
    winFirst=null; winEdge=null; setBanner('Window added — tap two points for another, or pick another tool'); draw();
  }
}

/* ============ UNDO / HISTORY ============ */
let history=[];
function snapshot(){ return JSON.stringify({perimeter,rooms,openings,seeds}); }
function commit(){ history.push(snapshot()); if(history.length>40) history.shift(); }
function undo(){
  if(!history.length){ toast('Nothing to undo'); return; }
  const s=JSON.parse(history.pop());
  perimeter=s.perimeter; rooms=s.rooms; openings=s.openings; seeds=s.seeds;
  selectedId=null; renderChips(); renderEditor(); draw(); toast('Undo');
}
document.addEventListener('keydown',e=>{
  if(document.activeElement && document.activeElement.tagName==='INPUT') return;
  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); }
  else if((e.key==='Delete'||e.key==='Backspace')){
    if(selOpening>=0 && openings[selOpening]){ e.preventDefault(); commit(); openings.splice(selOpening,1); selOpening=-1; draw(); toast('Opening deleted'); }
    else if(selectedId && selectedId!=="PERIMETER"){ e.preventDefault(); commit(); deleteRoom(); }
  }
});

/* ============ DXF EXPORT ============ */
function buildDXF(){
  const iw=img.naturalWidth||1000, ih=img.naturalHeight||1000;
  const widthM=(isFinite(planWidthM)&&planWidthM>0)?planWidthM:10;
  let minx=1,maxx=0; (perimeter.length?perimeter:(rooms[0]?rooms[0].vertices:[[0,0],[1,1]])).forEach(p=>{ minx=Math.min(minx,p[0]); maxx=Math.max(maxx,p[0]); });
  const pxWidth=Math.max(1,(maxx-minx)*iw);
  const mpp=widthM/pxWidth;
  const X=fx=> (fx*iw)*mpp;
  const Y=fy=> ((ih-fy*ih))*mpp;     // flip Y for CAD
  const out=[]; const H=(c,v)=>{ out.push(c); out.push(v); };
  H(0,'SECTION'); H(2,'ENTITIES');
  const poly=(ring,layer,closed)=>{ H(0,'LWPOLYLINE'); H(8,layer); H(90,String(ring.length)); H(70, closed?'1':'0'); ring.forEach(([fx,fy])=>{ H(10,X(fx).toFixed(3)); H(20,Y(fy).toFixed(3)); }); };
  if(perimeter.length>=3) poly(perimeter,'APT_BOUNDARY',true);
  rooms.forEach(r=> poly(r.vertices, r.layer, true));
  openings.forEach(o=>{ H(0,'LINE'); H(8, o.type==='door'?'APT_DOOR':'APT_WINDOW'); H(10,X(o.segment[0][0]).toFixed(3)); H(20,Y(o.segment[0][1]).toFixed(3)); H(11,X(o.segment[1][0]).toFixed(3)); H(21,Y(o.segment[1][1]).toFixed(3)); });
  H(0,'ENDSEC'); H(0,'EOF');
  return out.join('\n');
}
function exportDXF(){
  if(!rooms.length && perimeter.length<3){ toast('Nothing to export yet'); return; }
  const blob=new Blob([buildDXF()],{type:'application/dxf'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='floorplan.dxf'; a.click();
  toast('DXF exported');
}


/* ============ DRAW ============ */
function ringPx(ring){ const W=canvas.width,H=canvas.height; return ring.map(([x,y])=>[x*W,y*H]); }
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height); const W=canvas.width,H=canvas.height;

  // optional wall / grid debug overlay
  if(showWalls){
    ctx.strokeStyle="rgba(46,155,214,.35)"; ctx.lineWidth=1; ctx.setLineDash([2,4]);
    walls.h.forEach(fy=>{ const y=fy*H; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); });
    walls.v.forEach(fx=>{ const x=fx*W; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); });
    ctx.strokeStyle="rgba(232,84,43,.45)"; ctx.setLineDash([6,4]);
    grid.x.forEach(fx=>{ const x=fx*W; ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); });
    grid.y.forEach(fy=>{ const y=fy*H; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); });
    ctx.setLineDash([]);
  }

  if(perimeter.length>=2){
    const pp=ringPx(perimeter);
    ctx.beginPath(); pp.forEach(([x,y],i)=> i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.closePath();
    ctx.fillStyle="rgba(255,255,255,.04)"; ctx.fill();
    ctx.setLineDash(selectedId==="PERIMETER"?[]:[7,5]);
    ctx.strokeStyle=selectedId==="PERIMETER"?"#15191C":"rgba(21,25,28,.6)";
    ctx.lineWidth=selectedId==="PERIMETER"?3:2; ctx.stroke(); ctx.setLineDash([]);
  }

  rooms.forEach(room=>{
    const t=typeFor(room.layer), sel=room.id===selectedId; const pts=ringPx(room.vertices);
    ctx.beginPath(); pts.forEach(([x,y],i)=> i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.closePath();
    if(room.layer==="APT_UNKNOWN"){ ctx.fillStyle="rgba(154,160,166,.16)"; ctx.fill(); ctx.setLineDash([5,4]); }
    else { ctx.fillStyle=hexA(t.color,sel?0.34:0.20); ctx.fill(); ctx.setLineDash([]); }
    ctx.strokeStyle=t.color; ctx.lineWidth=sel?3:1.8; ctx.stroke(); ctx.setLineDash([]);
    const c=centroidPx(pts);
    ctx.font="600 12px 'IBM Plex Mono', monospace"; ctx.textAlign="center"; ctx.textBaseline="middle";
    const lbl=t.label.toUpperCase(), tw=ctx.measureText(lbl).width;
    ctx.fillStyle="rgba(242,238,229,.9)"; ctx.fillRect(c.x-tw/2-5,c.y-9,tw+10,18);
    ctx.fillStyle=t.color; ctx.fillText(lbl,c.x,c.y);
  });

  if(showOpenings) openings.forEach((o,oi)=>{
    const [a,b]=o.segment.map(([x,y])=>[x*W,y*H]); const [x1,y1]=a,[x2,y2]=b;
    if(o.type==='window'){ ctx.strokeStyle="#2E9BD6"; ctx.lineWidth=4; ctx.lineCap="butt"; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); ctx.strokeStyle="#fff"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); }
    else { const len=Math.hypot(x2-x1,y2-y1); ctx.strokeStyle="#E8542B"; ctx.lineWidth=3; ctx.lineCap="round"; ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke(); const ang=Math.atan2(y2-y1,x2-x1); ctx.strokeStyle="rgba(232,84,43,.5)"; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(x1,y1,len,ang,ang+Math.PI/2); ctx.stroke(); }
    if(oi===selOpening && step==='review'){
      [[x1,y1],[x2,y2]].forEach(([hx,hy])=>{ ctx.beginPath(); ctx.arc(hx,hy,7,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill(); ctx.lineWidth=2.5; ctx.strokeStyle=o.type==='window'?"#2E9BD6":"#E8542B"; ctx.stroke(); });
    }
  });
  // window in-progress: show the first point
  if(winFirst){ const fx=winFirst[0]*W, fy=winFirst[1]*H; ctx.beginPath(); ctx.arc(fx,fy,6,0,Math.PI*2); ctx.fillStyle="#2E9BD6"; ctx.fill(); ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke(); }

  // seeds (rooms-to-build as boxes) + the in-progress first corner
  seeds.forEach((s,i)=>{
    const x1=s.a[0]*W, y1=s.a[1]*H, x2=s.b[0]*W, y2=s.b[1]*H;
    ctx.fillStyle="rgba(232,84,43,.14)"; ctx.fillRect(x1,y1,x2-x1,y2-y1);
    ctx.strokeStyle="#E8542B"; ctx.lineWidth=2; ctx.setLineDash([5,4]);
    ctx.strokeRect(x1,y1,x2-x1,y2-y1); ctx.setLineDash([]);
    const cx=(x1+x2)/2, cy=(y1+y2)/2;
    ctx.beginPath(); ctx.arc(cx,cy,11,0,Math.PI*2); ctx.fillStyle="#E8542B"; ctx.fill();
    ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle="#fff"; ctx.font="700 11px 'IBM Plex Mono'"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(i+1, cx, cy);
  });
  if(seedDraft){
    const x=seedDraft.a[0]*W, y=seedDraft.a[1]*H;
    ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fillStyle="#E8542B"; ctx.fill();
    ctx.strokeStyle="#fff"; ctx.lineWidth=2; ctx.stroke();
  }

  // active ring handles (corners + edge midpoints)
  const active=activeRing();
  if(active && step==='review'){
    const pts=ringPx(active);
    for(let i=0;i<pts.length;i++){ const a=pts[i],b=pts[(i+1)%pts.length]; const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2; ctx.fillStyle="rgba(232,84,43,.9)"; ctx.fillRect(mx-5,my-5,10,10); }
    pts.forEach(([x,y])=>{ ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2); ctx.fillStyle="#fff"; ctx.fill(); ctx.lineWidth=2.5; ctx.strokeStyle=selectedId==="PERIMETER"?"#15191C":typeFor(roomById(selectedId)?.layer).color; ctx.stroke(); });
  }

  // draw-perimeter preview
  if(drawMode && drawPts.length){
    const pp=drawPts.map(([x,y])=>[x*W,y*H]);
    ctx.setLineDash([4,4]); ctx.strokeStyle="#E8542B"; ctx.lineWidth=2;
    ctx.beginPath(); pp.forEach(([x,y],i)=> i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)); ctx.stroke(); ctx.setLineDash([]);
    pp.forEach(([x,y])=>{ ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle="#E8542B"; ctx.fill(); });
  }
}
function hexA(hex,a){const n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`;}
function centroidPx(pts){let x=0,y=0;pts.forEach(p=>{x+=p[0];y+=p[1];});return{x:x/pts.length,y:y/pts.length};}
function roomById(id){ return rooms.find(r=>r.id===id); }
function activeRing(){ if(selectedId==="PERIMETER") return perimeter; const r=roomById(selectedId); return r?r.vertices:null; }

/* ============ INTERACTION ============ */
let drag=null;
function evtPos(e){ const r=canvas.getBoundingClientRect(); return {x:(e.clientX-r.left)/r.width,y:(e.clientY-r.top)/r.height}; }
function nearPx(ax,ay,bx,by,px){ return Math.hypot((ax-bx)*canvas.width,(ay-by)*canvas.height)<px; }
const activePointers=new Map(); let gesture=null;
function gestureFrom(){ const p=[...activePointers.values()]; const dx=p[0].x-p[1].x,dy=p[0].y-p[1].y; return {dist:Math.hypot(dx,dy),cx:(p[0].x+p[1].x)/2,cy:(p[0].y+p[1].y)/2}; }

canvas.addEventListener('pointerdown',e=>{
  activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size===2){ drag=null; gesture=gestureFrom(); return; }
  if(activePointers.size>2) return;
  const p=evtPos(e);

  if(drawMode){ drawPts.push([p.x,p.y]); draw(); return; }

  if(seedMode){
    // tap inside a finished box to remove it
    const hit = seeds.findIndex(s=> p.x>=Math.min(s.a[0],s.b[0]) && p.x<=Math.max(s.a[0],s.b[0]) && p.y>=Math.min(s.a[1],s.b[1]) && p.y<=Math.max(s.a[1],s.b[1]));
    if(hit>=0 && !seedDraft){ seeds.splice(hit,1); draw(); updateSeedCount(); return; }

    const snapped = snapPoint([p.x,p.y]);

    if(!seedDraft){
      seedDraft = {a:snapped};
      setBanner('Now tap the OPPOSITE corner of that room');
    } else {
      const a = seedDraft.a, b = snapped;
      // normalise to TL/BR
      const tl=[Math.min(a[0],b[0]), Math.min(a[1],b[1])];
      const br=[Math.max(a[0],b[0]), Math.max(a[1],b[1])];
      if(Math.abs(br[0]-tl[0])<0.01 || Math.abs(br[1]-tl[1])<0.01){ toast('Box too small'); seedDraft=null; draw(); return; }
      seeds.push({a:tl, b:br});
      seedDraft=null;
      // grow the snap grid from this room's accepted edges
      grid.x.push(round3(tl[0]), round3(br[0])); grid.x.sort((u,v)=>u-v);
      grid.y.push(round3(tl[1]), round3(br[1])); grid.y.sort((u,v)=>u-v);
      setBanner(seeds.length===1
        ? 'One room placed. Subsequent rooms will snap to its walls — keep going.'
        : `Tap top-left of the next room (${seeds.length} placed).`);
    }
    draw(); updateSeedCount(); return;
  }

  const active=activeRing();

  // opening placement tools
  if(step==='review' && openingMode==='door'){ placeDoor(p.x,p.y); return; }
  if(step==='review' && openingMode==='window'){ windowClick(p.x,p.y); return; }

  // edit an existing opening: endpoint handle of selected one, or pick one up
  if(step==='review'){
    if(selOpening>=0 && openings[selOpening]){
      const o=openings[selOpening];
      for(let k=0;k<2;k++){ if(nearPx(o.segment[k][0],o.segment[k][1],p.x,p.y,16)){ commit(); dragOpen={idx:selOpening,end:k}; canvas.setPointerCapture(e.pointerId); return; } }
    }
    let oi=-1,od=1e9;
    openings.forEach((o,i)=>{ const d=distToSeg(p.x,p.y,o.segment[0][0],o.segment[0][1],o.segment[1][0],o.segment[1][1]); if(d<od){od=d;oi=i;} });
    if(oi>=0 && od<0.02){
      selOpening=oi; selectedId=null; document.getElementById('editor').style.display='none';
      commit(); dragOpen={idx:oi,end:'whole',start:{x:p.x,y:p.y},seg0:openings[oi].segment.map(q=>[q[0],q[1]])};
      canvas.setPointerCapture(e.pointerId); renderChips(); draw(); return;
    }
    if(selOpening>=0){ selOpening=-1; }
  }

  // vertex add/remove modes (one tap, then back to normal)
  if(active && step==='review' && vertexMode!=='none'){
    commit();
    if(vertexMode==='add'){
      let best=-1,bestD=1e9;
      for(let i=0;i<active.length;i++){ const a=active[i],b=active[(i+1)%active.length]; const d=distToSeg(p.x,p.y,a[0],a[1],b[0],b[1]); if(d<bestD){bestD=d;best=i;} }
      if(best>=0){ active.splice(best+1,0,[p.x,p.y]); toast('Corner added'); }
    } else if(vertexMode==='del'){
      let best=-1,bestD=1e9;
      for(let i=0;i<active.length;i++){ const d=Math.hypot(active[i][0]-p.x,active[i][1]-p.y); if(d<bestD){bestD=d;best=i;} }
      if(best>=0){
        if(active.length<=3){ toast('A room needs at least 3 corners'); }
        else { active.splice(best,1); if(weldLock) weldAll(); toast('Corner removed'); }
      }
    }
    setVertexMode('none'); draw(); return;
  }

  if(active && step==='review'){
    for(let i=0;i<active.length;i++){ if(nearPx(active[i][0],active[i][1],p.x,p.y,16)){ commit(); drag={kind:'vertex',groups:dragGroup(active,i)}; canvas.setPointerCapture(e.pointerId); return; } }
    for(let i=0;i<active.length;i++){ const a=active[i],b=active[(i+1)%active.length]; const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2; if(nearPx(mx,my,p.x,p.y,16)){ commit(); drag={kind:'edge',ia:i,ib:(i+1)%active.length,ga:dragGroup(active,i),gb:dragGroup(active,(i+1)%active.length),start:{x:p.x,y:p.y},a0:[a[0],a[1]],b0:[b[0],b[1]]}; canvas.setPointerCapture(e.pointerId); return; } }
  }

  if(step==='review'){
    const hit=[...rooms].reverse().find(r=>pointInPoly({x:p.x,y:p.y},r.vertices));
    if(hit) selectRoom(hit.id);
    else if(perimeter.length>=3 && pointInPoly({x:p.x,y:p.y},perimeter)) selectPerimeter();
    else deselect();
  }
});

canvas.addEventListener('pointermove',e=>{
  if(activePointers.has(e.pointerId)) activePointers.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(activePointers.size>=2 && gesture){ const g=gestureFrom(); if(g.dist>0&&gesture.dist>0) zoomAbout(g.dist/gesture.dist,g.cx,g.cy); view.tx+=(g.cx-gesture.cx); view.ty+=(g.cy-gesture.cy); applyView(); gesture=g; return; }
  if(!drag && !dragOpen) return;
  const p=evtPos(e);
  if(dragOpen){
    const o=openings[dragOpen.idx]; if(!o){ return; }
    if(dragOpen.end==='whole'){ const dx=p.x-dragOpen.start.x,dy=p.y-dragOpen.start.y; o.segment=[[dragOpen.seg0[0][0]+dx,dragOpen.seg0[0][1]+dy],[dragOpen.seg0[1][0]+dx,dragOpen.seg0[1][1]+dy]]; }
    else { o.segment[dragOpen.end]=[p.x,p.y]; }
    draw(); return;
  }
  if(drag.kind==='vertex'){ drag.groups.forEach(([ring,idx])=>{ ring[idx][0]=p.x; ring[idx][1]=p.y; }); draw(); }
  else if(drag.kind==='edge'){
    const W=canvas.width,H=canvas.height;
    // edge direction in pixel space, then its normal — move only along the normal
    let dirx=(drag.b0[0]-drag.a0[0])*W, diry=(drag.b0[1]-drag.a0[1])*H;
    const len=Math.hypot(dirx,diry)||1; dirx/=len; diry/=len;
    const nx=-diry, ny=dirx;                       // unit normal (px)
    const dpx=(p.x-drag.start.x)*W, dpy=(p.y-drag.start.y)*H;
    const perp=dpx*nx+dpy*ny;                       // signed perpendicular distance
    const mx=(nx*perp)/W, my=(ny*perp)/H;           // back to image fractions
    drag.ga.forEach(([ring,idx])=>{ ring[idx][0]=drag.a0[0]+mx; ring[idx][1]=drag.a0[1]+my; });
    drag.gb.forEach(([ring,idx])=>{ ring[idx][0]=drag.b0[0]+mx; ring[idx][1]=drag.b0[1]+my; });
    draw();
  }
});
function endDrag(e){ if(e&&e.pointerId!=null) activePointers.delete(e.pointerId); if(activePointers.size<2) gesture=null; if(dragOpen){ dragOpen=null; snapOpenings(); draw(); } if(drag){ drag=null; if(weldLock) weldAll(); draw(); } }
canvas.addEventListener('pointerup',endDrag);
canvas.addEventListener('pointercancel',endDrag);

canvas.addEventListener('dblclick',e=>{
  const active=activeRing(); if(!active||step!=='review') return;
  const p=evtPos(e); const W=canvas.width,H=canvas.height; let best=-1,bestD=1e9;
  for(let i=0;i<active.length;i++){ const a=active[i],b=active[(i+1)%active.length]; const d=distToSeg(p.x,p.y,a[0],a[1],b[0],b[1]); if(d<bestD){bestD=d;best=i;} }
  if(best>=0 && bestD*Math.max(W,H)<14){ active.splice(best+1,0,[p.x,p.y]); draw(); toast('Corner added'); }
});
function distToSeg(px,py,ax,ay,bx,by){ const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy; let t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0; t=Math.max(0,Math.min(1,t)); return Math.hypot(px-(ax+t*dx),py-(ay+t*dy)); }
function pointInPoly(p,v){ let inside=false; for(let i=0,j=v.length-1;i<v.length;j=i++){ const xi=v[i][0],yi=v[i][1],xj=v[j][0],yj=v[j][1]; if(((yi>p.y)!==(yj>p.y))&&(p.x<(xj-xi)*(p.y-yi)/(yj-yi)+xi)) inside=!inside; } return inside; }

/* perimeter draw finish */
function finishDraw(){
  if(drawPts.length<3){ toast('Tap at least 3 corners'); return; }
  // snap the user's traced corners to detected walls so the boundary is straight
  perimeter = drawPts.map(snapPoint);
  rectilinearize(perimeter);          // force right angles
  weldAll();
  rebuildGrid();                      // seed the snap grid from the boundary
  drawMode=false; drawPts=[];
  setBanner('Outline set. Drag corners or "Fit to walls" if needed, then Next: rooms.');
  toast('Outline traced & snapped');
  draw();
}

/* ============ SHEET ============ */
function openSheet(){ document.getElementById('sheet').style.display='block'; expandSheet(); }
let sheetCollapsed=false;
function toggleSheet(){ sheetCollapsed=!sheetCollapsed; document.getElementById('sheet').classList.toggle('collapsed',sheetCollapsed); document.getElementById('peekLabel').textContent=sheetCollapsed?'tap to expand':'tap to expand · drag to move'; }
function expandSheet(){ sheetCollapsed=false; document.getElementById('sheet').classList.remove('collapsed'); }
(function(){ const sheet=document.getElementById('sheet'),zone=document.getElementById('grabZone'); let sd=null;
  zone.addEventListener('pointerdown',e=>{ sd={sx:e.clientX,sy:e.clientY,moved:false}; const r=sheet.getBoundingClientRect(); sd.ox=e.clientX-r.left; sd.oy=e.clientY-r.top; zone.setPointerCapture(e.pointerId); });
  zone.addEventListener('pointermove',e=>{ if(!sd)return; if(Math.hypot(e.clientX-sd.sx,e.clientY-sd.sy)>6){ sd.moved=true; sheet.classList.add('floating'); sheet.classList.remove('collapsed'); sheetCollapsed=false; sheet.style.left=Math.max(6,Math.min(innerWidth-60,e.clientX-sd.ox))+'px'; sheet.style.top=Math.max(6,Math.min(innerHeight-60,e.clientY-sd.oy))+'px'; sheet.style.right='auto'; sheet.style.bottom='auto'; } });
  zone.addEventListener('pointerup',()=>{ if(sd&&!sd.moved) toggleSheet(); sd=null; });
  zone.addEventListener('pointercancel',()=>{ sd=null; });
})();

function updateSeedCount(){ document.getElementById('roomCount').textContent = seeds.length+' room'+(seeds.length!==1?'s':'')+(seedDraft?' · placing…':''); }
function renderChips(){
  if(step!=='review'){ if(step==='seeds') updateSeedCount(); else document.getElementById('roomCount').textContent=''; document.getElementById('roomChips').innerHTML=''; return; }
  const oc=openings.length?' · '+openings.length+' opening'+(openings.length!==1?'s':''):'';
  document.getElementById('roomCount').textContent=rooms.length+' room'+(rooms.length!==1?'s':'')+oc;
  const wrap=document.getElementById('roomChips'); wrap.innerHTML='';
  const pc=document.createElement('div'); pc.className='chip'+(selectedId==="PERIMETER"?' sel':''); pc.innerHTML=`<span class="sw" style="background:#15191C"></span>Outline`; pc.onclick=()=> selectedId==="PERIMETER"?deselect():selectPerimeter(); wrap.appendChild(pc);
  rooms.forEach(room=>{ const t=typeFor(room.layer); const c=document.createElement('div'); c.className='chip'+(room.id===selectedId?' sel':''); c.innerHTML=`<span class="sw" style="background:${t.color}"></span>${t.label}`; c.onclick=()=> room.id===selectedId?deselect():selectRoom(room.id); wrap.appendChild(c); });
}
function selectRoom(id){ selectedId=id; document.getElementById('editor').style.display='block'; renderChips(); renderEditor(); draw(); }
function selectPerimeter(){ selectedId="PERIMETER"; document.getElementById('editor').style.display='none'; setBanner('Outline selected — drag corners/edges; double-tap an edge to add a corner'); setTimeout(()=>setBanner(null),2400); renderChips(); draw(); }
function deselect(){ selectedId=null; vertexMode='none'; openingMode='none'; selOpening=-1; winFirst=null; document.getElementById('editor').style.display='none'; renderChips(); draw(); }
function renderEditor(){ const room=roomById(selectedId); if(!room){document.getElementById('editor').style.display='none';return;} const wrap=document.getElementById('relabel'); wrap.innerHTML=''; TYPES.forEach(t=>{ const b=document.createElement('div'); b.className='rl'+(t.layer===room.layer?' on':''); b.innerHTML=`<span class="sw" style="background:${t.color}"></span>${t.label}`; b.onclick=()=>{ commit(); room.layer=t.layer; renderChips(); renderEditor(); draw(); }; wrap.appendChild(b); }); }
function deleteRoom(){ rooms=rooms.filter(r=>r.id!==selectedId); deselect(); renderChips(); toast('Room deleted'); }
function duplicateRoom(){ const room=roomById(selectedId); if(!room)return; const copy={id:uid++,layer:room.layer,vertices:room.vertices.map(([x,y])=>[x+0.04,y+0.04])}; rooms.push(copy); selectRoom(copy.id); renderChips(); }
function addRoom(){ const c=perimeter.length?centroidFrac(perimeter):{x:0.5,y:0.5}; const s=0.12; const v=[[c.x-s,c.y-s],[c.x+s,c.y-s],[c.x+s,c.y+s],[c.x-s,c.y+s]]; const r={id:uid++,layer:"APT_ROOM_BED1",vertices:v}; rooms.push(r); selectRoom(r.id); renderChips(); toast('Drag edges/corners to fit'); }
function centroidFrac(ring){let x=0,y=0;ring.forEach(p=>{x+=p[0];y+=p[1];});return{x:x/ring.length,y:y/ring.length};}

function toggleOpenings(){ showOpenings=!showOpenings; draw(); toast(showOpenings?'Doors/windows on':'Doors/windows hidden'); }
function toggleRefine(){ const b=document.getElementById('refineBar'); const open=b.style.display==='flex'; b.style.display=open?'none':'flex'; if(!open) document.getElementById('refineInput').focus(); }

/* ============ EXPORT ============ */
function round(n){return Math.round(n*1000)/1000;}
function exportObject(){
  return {
    perimeter: perimeter.map(([x,y])=>[round(x),round(y)]),
    rooms: rooms.map(r=>({layer:r.layer,label:typeFor(r.layer).label,vertices:r.vertices.map(([x,y])=>[round(x),round(y)])})),
    openings: openings.map(o=>({type:o.type,segment:o.segment.map(([x,y])=>[round(x),round(y)])})),
    scale: meta.scale||{found:false}, north: meta.north||{found:false,direction_degrees:0}
  };
}
function openExport(){ expandSheet(); document.getElementById('mainView').style.display='none'; document.getElementById('exportPanel').style.display='block'; document.getElementById('jsonOut').textContent=JSON.stringify(exportObject(),null,2); }
function closeExport(){ document.getElementById('exportPanel').style.display='none'; document.getElementById('mainView').style.display='block'; }
function copyJSON(){ navigator.clipboard.writeText(JSON.stringify(exportObject(),null,2)); toast('JSON copied'); }
function downloadJSON(){ const blob=new Blob([JSON.stringify(exportObject(),null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='floorplan-rooms.json'; a.click(); toast('Downloaded'); }
function sendToChecker(){
  if(!rooms.length){ toast('Generate rooms first'); return; }
  try{
    sessionStorage.setItem('apt_rooms', JSON.stringify(exportObject()));
    sessionStorage.setItem('apt_dxf', buildDXF());
    sessionStorage.setItem('apt_scale_m', String(planWidthM));
  }catch(e){}
  toast('Opening checker…');
  setTimeout(()=>{ window.location.href = CHECKER_URL; }, 350);
}

/* ============ MISC ============ */
function showErr(m){const e=document.getElementById('errBox');e.style.display='block';e.textContent=m;}
function hideErr(){document.getElementById('errBox').style.display='none';}
function setBanner(msg){const el=document.getElementById('banner'); if(!msg){el.style.display='none';return;} el.style.display='block'; el.textContent=msg;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function restart(){
  rooms=[];openings=[];perimeter=[];seeds=[];seedDraft=null;walls={h:[],v:[]};grid={x:[],y:[]};selectedId=null;imgData=null;drawMode=false;drawPts=[];seedMode=false;history=[];vertexMode='none';openingMode='none';selOpening=-1;winFirst=null;setBanner(null);resetView();
  document.getElementById('work').style.display='none';
  document.getElementById('sheet').style.display='none';
  document.getElementById('restartBtn').style.display='none';
  document.getElementById('upload').style.display='flex';
  document.getElementById('mainView').style.display='block';
  document.getElementById('exportPanel').style.display='none';
  img.src='';
}
</script>
